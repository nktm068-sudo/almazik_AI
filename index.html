<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алмазик AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="status">Алмазик готов</div>
        <div class="orb" id="orb" title="Нажми, чтобы говорить"></div>
        
        <div id="chat-box">
            <div class="msg ai"><b>Алмазик:</b> Привет! Пиши или говори со мной.</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Напиши сообщение...">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
